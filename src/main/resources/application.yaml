spring:
  application:
    name: Porto Books
  datasource:
    url: jdbc:h2:mem:porto_books
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enable: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    generate-ddl: true
    database-platform: org.hibernate.dialect.H2Dialect

